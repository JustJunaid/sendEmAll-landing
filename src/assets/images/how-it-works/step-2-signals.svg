<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <!-- Main card background -->
  <rect x="16" y="12" width="568" height="426" rx="12" fill="#252636" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Window chrome bar -->
  <rect x="16" y="12" width="568" height="40" rx="12" fill="#252636"/>
  <rect x="16" y="40" width="568" height="12" fill="#252636"/>
  <line x1="16" y1="52" x2="584" y2="52" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="40" cy="32" r="6" fill="#FF5F57"/>
  <circle cx="58" cy="32" r="6" fill="#FEBC2E"/>
  <circle cx="76" cy="32" r="6" fill="#28C840"/>

  <!-- SendEmAll text -->
  <text x="100" y="37" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#D2B3F3">SendEmAll</text>

  <!-- Right-aligned stats pills -->
  <rect x="390" y="20" width="80" height="24" rx="12" fill="#28C840" fill-opacity="0.15"/>
  <text x="430" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399" text-anchor="middle">Active 47</text>
  <rect x="478" y="20" width="100" height="24" rx="12" fill="#8B8BA0" fill-opacity="0.15"/>
  <text x="528" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8B8BA0" text-anchor="middle">Monitoring 283</text>

  <!-- Title -->
  <text x="40" y="82" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#E8E8F0">Signal Detection</text>

  <!-- Column headers -->
  <text x="40" y="112" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8B8BA0" letter-spacing="1">COMPANY</text>
  <text x="260" y="112" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8B8BA0" letter-spacing="1">SCORE</text>
  <text x="330" y="112" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8B8BA0" letter-spacing="1">SIGNALS</text>
  <line x1="40" y1="122" x2="560" y2="122" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Row 1: Acme Corp -->
  <circle cx="56" cy="152" r="16" fill="#D2B3F3" fill-opacity="0.2"/>
  <text x="56" y="157" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#D2B3F3" text-anchor="middle">A</text>
  <text x="82" y="157" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E8E8F0">Acme Corp</text>
  <!-- Score -->
  <circle cx="272" cy="152" r="16" fill="#34D399" fill-opacity="0.15"/>
  <text x="272" y="157" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399" text-anchor="middle">.96</text>
  <!-- Signal pills -->
  <rect x="330" y="140" width="60" height="24" rx="12" fill="#34D399" fill-opacity="0.15"/>
  <text x="360" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399" text-anchor="middle">Hiring</text>
  <rect x="396" y="140" width="66" height="24" rx="12" fill="#5EEAD4" fill-opacity="0.15"/>
  <text x="429" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5EEAD4" text-anchor="middle">Funding</text>
  <rect x="468" y="140" width="50" height="24" rx="12" fill="#D2B3F3" fill-opacity="0.15"/>
  <text x="493" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#D2B3F3" text-anchor="middle">Tech</text>
  <!-- HOT badge -->
  <rect x="526" y="140" width="38" height="24" rx="12" fill="#F97066" fill-opacity="0.2"/>
  <text x="545" y="156" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F97066" text-anchor="middle">HOT</text>
  <line x1="40" y1="176" x2="560" y2="176" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Row 2: Beacon AI -->
  <circle cx="56" cy="206" r="16" fill="#5EEAD4" fill-opacity="0.2"/>
  <text x="56" y="211" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#5EEAD4" text-anchor="middle">B</text>
  <text x="82" y="211" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E8E8F0">Beacon AI</text>
  <circle cx="272" cy="206" r="16" fill="#34D399" fill-opacity="0.15"/>
  <text x="272" y="211" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399" text-anchor="middle">.87</text>
  <rect x="330" y="194" width="66" height="24" rx="12" fill="#5EEAD4" fill-opacity="0.15"/>
  <text x="363" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5EEAD4" text-anchor="middle">Funding</text>
  <rect x="402" y="194" width="60" height="24" rx="12" fill="#34D399" fill-opacity="0.15"/>
  <text x="432" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399" text-anchor="middle">Hiring</text>
  <line x1="40" y1="230" x2="560" y2="230" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Row 3: CloudFirst -->
  <circle cx="56" cy="260" r="16" fill="#D2B3F3" fill-opacity="0.15"/>
  <text x="56" y="265" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#D2B3F3" text-anchor="middle">C</text>
  <text x="82" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E8E8F0">CloudFirst</text>
  <circle cx="272" cy="260" r="16" fill="#D2B3F3" fill-opacity="0.15"/>
  <text x="272" y="265" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#D2B3F3" text-anchor="middle">.71</text>
  <rect x="330" y="248" width="94" height="24" rx="12" fill="#D2B3F3" fill-opacity="0.15"/>
  <text x="377" y="264" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#D2B3F3" text-anchor="middle">Tech Change</text>
  <line x1="40" y1="284" x2="560" y2="284" stroke="#3A3B4F" stroke-width="1"/>

  <!-- Row 4: DataSync (muted/monitoring) -->
  <circle cx="56" cy="314" r="16" fill="#8B8BA0" fill-opacity="0.1"/>
  <text x="56" y="319" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#8B8BA0" text-anchor="middle">D</text>
  <text x="82" y="319" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#8B8BA0">DataSync</text>
  <circle cx="272" cy="314" r="16" fill="#8B8BA0" fill-opacity="0.1"/>
  <text x="272" y="319" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#8B8BA0" text-anchor="middle">.42</text>
  <text x="330" y="319" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#8B8BA0" font-style="italic">Monitoring...</text>
  <line x1="40" y1="338" x2="560" y2="338" stroke="#3A3B4F" stroke-width="1"/>
</svg>