# Site Configuration
[site]
  title              = "SendEmAll"
  description        = "The complete outbound platform. One tool replaces five. Signal-qualified leads, managed email infrastructure, AI personalization, and guaranteed replies — starting at $149/mo."
  tagline            = "The Complete Outbound Platform"
  taglineSeparator   = " | "
  baseUrl            = "https://sendemall.com"
  logo               = "/images/sendemall-logo-dark.svg"
  logoHoverAnimation = false
  logoText           = ""
  logoWidth          = "140px"
  logoHeight         = "36px"

  trailingSlash = false

  [site.favicon]
    path  = "/images/favicons"
    image = "/images/favicons/favicon.svg"

  # msapplication tile color matches dark theme
  msapplicationTileColor = "#0a0a1a"


# SEO Metadata
[seo]
  author = "SendEmAll"
  keywords = [
    "cold email platform",
    "outbound sales tool",
    "email infrastructure",
    "lead generation",
    "AI personalization",
    "email deliverability",
    "sales automation",
    "managed mailboxes",
    "signal-qualified leads",
  ]
  robots = "index, follow"

  [seo.robotsTxt]
    enable = false  # We use our own robots.txt

  [seo.sitemap]
    enable = true
    exclude = []


[settings]
  blogFolder        = "blog"
  integrationFolder = "integration"

  pagination   = 9
  stickyHeader = true

  contactFormAction   = "https://formsubmit.co/hello@sendemall.com"
  contactFormProvider = "formsubmit.co"

  footerDescription = "The complete outbound platform. One tool, one price, guaranteed replies."

  [settings.copyright]
    enable = true
    text   = "© 2026 SendEmAll. All rights reserved."

  [settings.subscription]
    enable     = false
    title      = ""
    formAction = ""

  [settings.multilingual]
    enable               = false
    defaultLanguage      = "en"
    disableLanguages     = []
    showDefaultLangInUrl = false

  [settings.navigationButton]
    enable = true
    label  = "Try It Free"
    url    = "https://app.sendemall.com/signup"

  [settings.markup.tableOfContents]
    enable     = true
    expanded   = true
    endLevel   = 4
    startLevel = 2


# OpenGraph Metadata
[opengraph]
  image       = "/images/og-image.png"
  ogLocale    = "en_US"
  ogType      = "website"
  twitter     = "@sendemall"
  twitterCard = "summary_large_image"

